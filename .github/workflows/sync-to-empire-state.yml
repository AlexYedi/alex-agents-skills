name: Sync product skills to Empire_State_Events_Pipeline_Take_3

on:
  push:
    branches: [main]
    paths:
      - 'Product/head-of-product-engineering/**'
      - 'Product/systems-thinking/**'
      - 'Product/ai-product-strategy/**'
      - 'Product/conducting-user-interviews/**'
      - 'Product/defining-product-vision/**'
      - 'Product/prioritizing-roadmap/**'
      - 'Product/shipping-products/**'
      - 'Product/writing-north-star-metrics/**'
      - 'Product/writing-prds/**'
      - 'Product/product-launch-orchestration/skills/launch-tiering/**'
      - 'Product/product-launch-orchestration/skills/risk-playbooks/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream (alex-agents-skills)
        uses: actions/checkout@v4
        with:
          path: upstream

      - name: Checkout downstream (Empire_State_Events_Pipeline_Take_3)
        uses: actions/checkout@v4
        with:
          repository: AlexYedi/Empire_State_Events_Pipeline_Take_3
          token: ${{ secrets.EMPIRE_STATE_SYNC_TOKEN }}
          path: downstream
          fetch-depth: 0

      - name: Sync skill directories
        run: |
          set -euo pipefail
          declare -A MAPPING=(
            ["Product/head-of-product-engineering"]=".claude/skills/head-of-product-engineering"
            ["Product/systems-thinking"]=".claude/skills/systems-thinking"
            ["Product/ai-product-strategy"]=".claude/skills/ai-product-strategy"
            ["Product/conducting-user-interviews"]=".claude/skills/conducting-user-interviews"
            ["Product/defining-product-vision"]=".claude/skills/defining-product-vision"
            ["Product/prioritizing-roadmap"]=".claude/skills/prioritizing-roadmap"
            ["Product/shipping-products"]=".claude/skills/shipping-products"
            ["Product/writing-north-star-metrics"]=".claude/skills/writing-north-star-metrics"
            ["Product/writing-prds"]=".claude/skills/writing-prds"
            ["Product/product-launch-orchestration/skills/launch-tiering"]=".claude/skills/launch-tiering"
            ["Product/product-launch-orchestration/skills/risk-playbooks"]=".claude/skills/risk-playbooks"
          )
          for src in "${!MAPPING[@]}"; do
            dest="${MAPPING[$src]}"
            src_path="upstream/$src"
            dest_path="downstream/$dest"
            if [ -d "$src_path" ]; then
              mkdir -p "$(dirname "$dest_path")"
              rsync -a "$src_path/" "$dest_path/"
              echo "Synced: $src -> $dest"
            else
              echo "Skipped (missing upstream): $src"
            fi
          done

      - name: Check for changes
        id: diff
        working-directory: downstream
        run: |
          if git diff --quiet && git diff --quiet --cached; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: downstream
        env:
          GH_TOKEN: ${{ secrets.EMPIRE_STATE_SYNC_TOKEN }}
          UPSTREAM_SHA: ${{ github.sha }}
          UPSTREAM_REPO: ${{ github.repository }}
          UPSTREAM_MSG: ${{ github.event.head_commit.message }}
          UPSTREAM_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          short_sha="${UPSTREAM_SHA:0:7}"
          branch="sync-upstream-${short_sha}"

          git config user.name "alex-agents-skills sync bot"
          git config user.email "sync-bot@users.noreply.github.com"

          # Use -B so it works whether or not the branch already exists locally.
          git checkout -B "$branch"
          git add -A

          if git diff --quiet --cached; then
            echo "Nothing to commit after staging."
            exit 0
          fi

          git commit -m "Sync product skills from ${UPSTREAM_REPO}@${short_sha}

          Upstream commit: ${UPSTREAM_SHA}
          Triggered by: ${UPSTREAM_ACTOR}

          Auto-generated by .github/workflows/sync-to-empire-state.yml"

          git push -u origin "$branch" --force-with-lease

          body=$(cat <<EOF
          Auto-sync from [${UPSTREAM_REPO}@${short_sha}](https://github.com/${UPSTREAM_REPO}/commit/${UPSTREAM_SHA}).

          **Upstream commit message:**
          > ${UPSTREAM_MSG}

          **Skills in scope:**
          - head-of-product-engineering
          - systems-thinking
          - ai-product-strategy
          - conducting-user-interviews
          - defining-product-vision
          - prioritizing-roadmap
          - shipping-products
          - writing-north-star-metrics
          - writing-prds
          - launch-tiering
          - risk-playbooks

          Generated by \`.github/workflows/sync-to-empire-state.yml\` in ${UPSTREAM_REPO}.
          EOF
          )

          # Reuse an open PR for this branch if one exists; otherwise create.
          existing_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$existing_pr" ]; then
            echo "Reusing existing PR #$existing_pr"
            gh pr edit "$existing_pr" --body "$body"
          else
            gh pr create \
              --title "Sync upstream: ${UPSTREAM_REPO}@${short_sha}" \
              --body "$body" \
              --base main \
              --head "$branch"
          fi
